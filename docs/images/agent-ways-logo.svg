<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <!-- Clipping path to the rounded frame -->
    <clipPath id="frame">
      <rect width="600" height="400" rx="12"/>
    </clipPath>
    <!-- Glow effect for bright nodes -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow for W edges -->
    <filter id="edgeglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#0d1117" rx="12"/>

  <!-- Everything clipped to frame -->
  <g clip-path="url(#frame)">

    <!-- === BACKGROUND NETWORK (dense, filling entire frame) === -->
    <g stroke="#334155" stroke-width="0.8" opacity="0.25">
      <!-- Row 1 (y ~ -10 to 50) -->
      <line x1="-20" y1="15" x2="45" y2="35"/>
      <line x1="45" y1="35" x2="90" y2="10"/>
      <line x1="90" y1="10" x2="140" y2="40"/>
      <line x1="140" y1="40" x2="200" y2="20"/>
      <line x1="200" y1="20" x2="250" y2="45"/>
      <line x1="250" y1="45" x2="310" y2="25"/>
      <line x1="310" y1="25" x2="370" y2="42"/>
      <line x1="370" y1="42" x2="420" y2="15"/>
      <line x1="420" y1="15" x2="480" y2="38"/>
      <line x1="480" y1="38" x2="540" y2="20"/>
      <line x1="540" y1="20" x2="595" y2="45"/>
      <line x1="595" y1="45" x2="620" y2="25"/>
      <!-- Row 2 (y ~ 60 to 100) -->
      <line x1="-15" y1="75" x2="35" y2="90"/>
      <line x1="35" y1="90" x2="85" y2="70"/>
      <line x1="85" y1="70" x2="130" y2="95"/>
      <line x1="130" y1="95" x2="185" y2="75"/>
      <line x1="185" y1="75" x2="240" y2="98"/>
      <line x1="240" y1="98" x2="295" y2="80"/>
      <line x1="295" y1="80" x2="355" y2="95"/>
      <line x1="355" y1="95" x2="410" y2="72"/>
      <line x1="410" y1="72" x2="465" y2="92"/>
      <line x1="465" y1="92" x2="525" y2="75"/>
      <line x1="525" y1="75" x2="580" y2="95"/>
      <line x1="580" y1="95" x2="620" y2="80"/>
      <!-- Row 3 (y ~ 130 to 170) -->
      <line x1="-10" y1="140" x2="40" y2="160"/>
      <line x1="40" y1="160" x2="95" y2="140"/>
      <line x1="95" y1="140" x2="150" y2="165"/>
      <line x1="150" y1="165" x2="210" y2="145"/>
      <line x1="355" y1="155" x2="410" y2="140"/>
      <line x1="410" y1="140" x2="465" y2="160"/>
      <line x1="465" y1="160" x2="530" y2="145"/>
      <line x1="530" y1="145" x2="585" y2="165"/>
      <line x1="585" y1="165" x2="620" y2="150"/>
      <!-- Row 4 (y ~ 200 to 240) -->
      <line x1="-15" y1="210" x2="40" y2="225"/>
      <line x1="40" y1="225" x2="95" y2="205"/>
      <line x1="95" y1="205" x2="140" y2="230"/>
      <line x1="460" y1="215" x2="520" y2="230"/>
      <line x1="520" y1="230" x2="575" y2="210"/>
      <line x1="575" y1="210" x2="620" y2="235"/>
      <!-- Row 5 (y ~ 270 to 310) -->
      <line x1="-10" y1="280" x2="45" y2="295"/>
      <line x1="45" y1="295" x2="100" y2="275"/>
      <line x1="100" y1="275" x2="150" y2="300"/>
      <line x1="150" y1="300" x2="200" y2="280"/>
      <line x1="400" y1="290" x2="455" y2="275"/>
      <line x1="455" y1="275" x2="515" y2="300"/>
      <line x1="515" y1="300" x2="570" y2="280"/>
      <line x1="570" y1="280" x2="620" y2="295"/>
      <!-- Row 6 (y ~ 330 to 370) -->
      <line x1="-20" y1="345" x2="40" y2="360"/>
      <line x1="40" y1="360" x2="100" y2="340"/>
      <line x1="100" y1="340" x2="160" y2="365"/>
      <line x1="160" y1="365" x2="220" y2="345"/>
      <line x1="220" y1="345" x2="280" y2="370"/>
      <line x1="280" y1="370" x2="340" y2="350"/>
      <line x1="340" y1="350" x2="400" y2="370"/>
      <line x1="400" y1="370" x2="460" y2="348"/>
      <line x1="460" y1="348" x2="520" y2="368"/>
      <line x1="520" y1="368" x2="575" y2="345"/>
      <line x1="575" y1="345" x2="620" y2="365"/>
      <!-- Row 7 (beyond bottom) -->
      <line x1="-10" y1="400" x2="55" y2="410"/>
      <line x1="200" y1="405" x2="300" y2="415"/>
      <line x1="400" y1="408" x2="500" y2="415"/>
      <line x1="550" y1="405" x2="620" y2="410"/>
      <!-- Vertical/diagonal connections between rows -->
      <line x1="45" y1="35" x2="35" y2="90"/>
      <line x1="90" y1="10" x2="85" y2="70"/>
      <line x1="140" y1="40" x2="130" y2="95"/>
      <line x1="250" y1="45" x2="240" y2="98"/>
      <line x1="310" y1="25" x2="295" y2="80"/>
      <line x1="420" y1="15" x2="410" y2="72"/>
      <line x1="480" y1="38" x2="465" y2="92"/>
      <line x1="540" y1="20" x2="525" y2="75"/>
      <line x1="35" y1="90" x2="40" y2="160"/>
      <line x1="85" y1="70" x2="95" y2="140"/>
      <line x1="130" y1="95" x2="150" y2="165"/>
      <line x1="410" y1="72" x2="410" y2="140"/>
      <line x1="465" y1="92" x2="465" y2="160"/>
      <line x1="525" y1="75" x2="530" y2="145"/>
      <line x1="580" y1="95" x2="585" y2="165"/>
      <line x1="40" y1="160" x2="40" y2="225"/>
      <line x1="95" y1="140" x2="95" y2="205"/>
      <line x1="530" y1="145" x2="520" y2="230"/>
      <line x1="575" y1="210" x2="570" y2="280"/>
      <line x1="40" y1="225" x2="45" y2="295"/>
      <line x1="95" y1="205" x2="100" y2="275"/>
      <line x1="520" y1="230" x2="515" y2="300"/>
      <line x1="455" y1="275" x2="460" y2="348"/>
      <line x1="45" y1="295" x2="40" y2="360"/>
      <line x1="100" y1="275" x2="100" y2="340"/>
      <line x1="150" y1="300" x2="160" y2="365"/>
      <line x1="515" y1="300" x2="520" y2="368"/>
      <line x1="570" y1="280" x2="575" y2="345"/>
      <line x1="200" y1="280" x2="220" y2="345"/>
      <line x1="400" y1="290" x2="400" y2="370"/>
      <!-- Diagonals for density -->
      <line x1="200" y1="20" x2="185" y2="75"/>
      <line x1="370" y1="42" x2="355" y2="95"/>
      <line x1="595" y1="45" x2="580" y2="95"/>
      <line x1="-15" y1="75" x2="-10" y2="140"/>
      <line x1="240" y1="98" x2="210" y2="145"/>
      <line x1="355" y1="95" x2="355" y2="155"/>
      <line x1="140" y1="230" x2="150" y2="300"/>
      <line x1="460" y1="215" x2="455" y2="275"/>
      <line x1="220" y1="345" x2="200" y2="280"/>
      <line x1="340" y1="350" x2="400" y2="290"/>
      <line x1="280" y1="370" x2="300" y2="415"/>
      <line x1="460" y1="348" x2="500" y2="415"/>
      <line x1="40" y1="360" x2="-10" y2="400"/>
      <line x1="575" y1="345" x2="620" y2="365"/>
    </g>

    <!-- Background nodes -->
    <g fill="#334155" opacity="0.3">
      <!-- Row 1 -->
      <circle cx="45" cy="35" r="2.5"/>
      <circle cx="90" cy="10" r="2"/>
      <circle cx="140" cy="40" r="2.5"/>
      <circle cx="200" cy="20" r="2"/>
      <circle cx="250" cy="45" r="3"/>
      <circle cx="310" cy="25" r="2"/>
      <circle cx="370" cy="42" r="2.5"/>
      <circle cx="420" cy="15" r="2"/>
      <circle cx="480" cy="38" r="2.5"/>
      <circle cx="540" cy="20" r="2"/>
      <circle cx="595" cy="45" r="2.5"/>
      <!-- Row 2 -->
      <circle cx="35" cy="90" r="2.5"/>
      <circle cx="85" cy="70" r="2"/>
      <circle cx="130" cy="95" r="2.5"/>
      <circle cx="185" cy="75" r="2"/>
      <circle cx="240" cy="98" r="3"/>
      <circle cx="295" cy="80" r="2"/>
      <circle cx="355" cy="95" r="2.5"/>
      <circle cx="410" cy="72" r="2"/>
      <circle cx="465" cy="92" r="2.5"/>
      <circle cx="525" cy="75" r="2"/>
      <circle cx="580" cy="95" r="2.5"/>
      <!-- Row 3 -->
      <circle cx="40" cy="160" r="2"/>
      <circle cx="95" cy="140" r="2.5"/>
      <circle cx="150" cy="165" r="2"/>
      <circle cx="210" cy="145" r="2.5"/>
      <circle cx="355" cy="155" r="2"/>
      <circle cx="410" cy="140" r="2.5"/>
      <circle cx="465" cy="160" r="2"/>
      <circle cx="530" cy="145" r="2.5"/>
      <circle cx="585" cy="165" r="2"/>
      <!-- Row 4 -->
      <circle cx="40" cy="225" r="2.5"/>
      <circle cx="95" cy="205" r="2"/>
      <circle cx="140" cy="230" r="2.5"/>
      <circle cx="460" cy="215" r="2"/>
      <circle cx="520" cy="230" r="2.5"/>
      <circle cx="575" cy="210" r="2"/>
      <!-- Row 5 -->
      <circle cx="45" cy="295" r="2"/>
      <circle cx="100" cy="275" r="2.5"/>
      <circle cx="150" cy="300" r="2"/>
      <circle cx="200" cy="280" r="2.5"/>
      <circle cx="400" cy="290" r="2"/>
      <circle cx="455" cy="275" r="2.5"/>
      <circle cx="515" cy="300" r="2"/>
      <circle cx="570" cy="280" r="2.5"/>
      <!-- Row 6 -->
      <circle cx="40" cy="360" r="2.5"/>
      <circle cx="100" cy="340" r="2"/>
      <circle cx="160" cy="365" r="2.5"/>
      <circle cx="220" cy="345" r="2"/>
      <circle cx="280" cy="370" r="2.5"/>
      <circle cx="340" cy="350" r="2"/>
      <circle cx="400" cy="370" r="2.5"/>
      <circle cx="460" cy="348" r="2"/>
      <circle cx="520" cy="368" r="2.5"/>
      <circle cx="575" cy="345" r="2"/>
    </g>

    <!-- === BRIDGE EDGES (background nodes connecting to W) === -->
    <g stroke="#d97706" stroke-width="0.8" opacity="0.15">
      <line x1="150" y1="165" x2="195" y2="160"/>
      <line x1="210" y1="145" x2="195" y2="160"/>
      <line x1="295" y1="80" x2="300" y2="180"/>
      <line x1="410" y1="140" x2="405" y2="160"/>
      <line x1="355" y1="155" x2="330" y2="220"/>
      <line x1="140" y1="230" x2="215" y2="200"/>
      <line x1="200" y1="280" x2="240" y2="280"/>
      <line x1="400" y1="290" x2="360" y2="280"/>
      <line x1="460" y1="215" x2="385" y2="200"/>
      <line x1="95" y1="205" x2="195" y2="160"/>
      <line x1="520" y1="230" x2="405" y2="160"/>
    </g>

    <!-- === THE W — attention cursor gradient: red (tips) → yellow → green (center) === -->

    <!--
      Color stops (7 steps per arm, tips to center):
      0: #ef4444 (red)       — tip, farthest from attention
      1: #f97316 (orange)
      2: #f59e0b (amber)
      3: #eab308 (yellow)
      4: #84cc16 (lime)
      5: #22c55e (green)
      6: #10b981 (emerald)   — center peak, attention cursor
    -->

    <!-- W edges (per-segment color) -->
    <g stroke-width="2.5" filter="url(#edgeglow)" stroke-linecap="round">
      <!-- Left arm: tip (red) → valley → center (green) -->
      <line x1="195" y1="160" x2="215" y2="200" stroke="#ef4444"/>
      <line x1="215" y1="200" x2="230" y2="245" stroke="#f97316"/>
      <line x1="230" y1="245" x2="240" y2="280" stroke="#f59e0b"/>
      <line x1="240" y1="280" x2="255" y2="250" stroke="#eab308"/>
      <line x1="255" y1="250" x2="270" y2="220" stroke="#84cc16"/>
      <line x1="270" y1="220" x2="285" y2="195" stroke="#22c55e"/>
      <line x1="285" y1="195" x2="300" y2="180" stroke="#10b981"/>

      <!-- Right arm: center (green) → valley → tip (red) -->
      <line x1="300" y1="180" x2="315" y2="195" stroke="#10b981"/>
      <line x1="315" y1="195" x2="330" y2="220" stroke="#22c55e"/>
      <line x1="330" y1="220" x2="345" y2="250" stroke="#84cc16"/>
      <line x1="345" y1="250" x2="360" y2="280" stroke="#eab308"/>
      <line x1="360" y1="280" x2="370" y2="245" stroke="#f59e0b"/>
      <line x1="370" y1="245" x2="385" y2="200" stroke="#f97316"/>
      <line x1="385" y1="200" x2="405" y2="160" stroke="#ef4444"/>
    </g>

    <!-- W nodes (per-node color, glowing) -->
    <g filter="url(#glow)">
      <!-- Left arm: tip → center -->
      <circle cx="195" cy="160" r="5" fill="#ef4444"/>
      <circle cx="215" cy="200" r="4.5" fill="#f97316"/>
      <circle cx="230" cy="245" r="4" fill="#f59e0b"/>
      <circle cx="240" cy="280" r="5.5" fill="#eab308"/>
      <circle cx="255" cy="250" r="4" fill="#84cc16"/>
      <circle cx="270" cy="220" r="4.5" fill="#22c55e"/>
      <circle cx="285" cy="195" r="4.5" fill="#10b981"/>

      <!-- Center peak -->
      <circle cx="300" cy="180" r="6" fill="#10b981"/>

      <!-- Right arm: center → tip -->
      <circle cx="315" cy="195" r="4.5" fill="#10b981"/>
      <circle cx="330" cy="220" r="4.5" fill="#22c55e"/>
      <circle cx="345" cy="250" r="4" fill="#84cc16"/>
      <circle cx="360" cy="280" r="5.5" fill="#eab308"/>
      <circle cx="370" cy="245" r="4" fill="#f59e0b"/>
      <circle cx="385" cy="200" r="4.5" fill="#f97316"/>
      <circle cx="405" cy="160" r="5" fill="#ef4444"/>
    </g>

    <!-- Inner glow dots on key W nodes -->
    <g opacity="0.6">
      <circle cx="195" cy="160" r="2.5" fill="#fca5a5"/>
      <circle cx="240" cy="280" r="2.5" fill="#fde68a"/>
      <circle cx="300" cy="180" r="3" fill="#6ee7b7"/>
      <circle cx="360" cy="280" r="2.5" fill="#fde68a"/>
      <circle cx="405" cy="160" r="2.5" fill="#fca5a5"/>
    </g>

    <!-- === TEXT === -->
    <text x="300" y="345" text-anchor="middle" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-size="13" letter-spacing="6" opacity="0.7">AGENT WAYS</text>

  </g>
</svg>
